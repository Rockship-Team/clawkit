name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: CGO_ENABLED=0 go build -o clawkit .

      - name: Test
        run: CGO_ENABLED=0 go test -v ./...

      - name: Verify binary runs
        run: ./clawkit version
